    <script>
      (function(locationData) {
        if (!locationData.search || locationData.search[1] !== '/') {
          return;
        }

        var decoded = locationData.search
          .slice(1)
          .split('&')
          .map(function(segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('&');
        var nextPath = decoded.slice(1) || '/';

        window.history.replaceState(
          null,
          '',
          nextPath + locationData.hash
        );
      })(window.location);
    </script>
